<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Тензоры — полное объяснение</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#07090f; color:#e2e8f0; font-family:'JetBrains Mono',monospace; overflow-x:hidden; }
.btn { cursor:pointer; border:none; font-family:'JetBrains Mono',monospace; }
.btn:disabled { opacity:0.3; cursor:default; }
@keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse   { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.08);opacity:1} }
@keyframes glow    { 0%,100%{box-shadow:0 0 6px #f59e0b44} 50%{box-shadow:0 0 18px #f59e0baa} }
@keyframes slideR  { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
.anim-up { animation:fadeUp 0.38s ease both; }
.anim-r  { animation:slideR 0.35s ease both; }
.pulse   { animation:pulse  2.3s ease-in-out infinite; }
.glow    { animation:glow   2s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ══════════════ CONSTANTS ══════════════ */
const TC = {
  dict:{ base:"#94a3b8", dim:"#1e2533" },
  r01: { base:"#f59e0b", dim:"#2d1e00" },
  r2:  { base:"#3b82f6", dim:"#00153b" },
  r3:  { base:"#a855f7", dim:"#1e0033" },
  r4:  { base:"#06b6d4", dim:"#002233" },
  repr:{ base:"#10b981", dim:"#00231a" },
};
const TABS = [
  {id:"dict", label:"📖 Словарь"},
  {id:"r01",  label:"Ранг 0 & 1"},
  {id:"r2",   label:"Ранг 2 — Матрица"},
  {id:"r3",   label:"Ранг 3 — Куб"},
  {id:"r4",   label:"Ранг 4 — Батч"},
  {id:"repr", label:"🔄 Тензор ≠ Форма"},
];

/* ══════════════ TINY HELPERS ══════════════ */
const Kd = ({c="#fde047",ch}) => <span style={{color:c,fontWeight:"700",fontSize:"13px",fontFamily:"JetBrains Mono"}}>{ch}</span>;
const Card = ({children,color="#3b82f6",style={}}) => (
  <div style={{background:`${color}11`,border:`1px solid ${color}44`,borderRadius:"10px",padding:"14px",...style}}>
    {children}
  </div>
);
const Badge = ({n,color}) => (
  <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
    width:"26px",height:"26px",borderRadius:"50%",background:color,
    fontSize:"12px",fontWeight:"700",color:"#07090f",flexShrink:0}}>{n}</div>
);
const Pill = ({children,color}) => (
  <span style={{display:"inline-block",background:color+"22",border:`1px solid ${color}66`,
    borderRadius:"6px",padding:"2px 8px",fontSize:"11px",color,fontWeight:"700"}}>{children}</span>
);
const hx = (h,a) => h+Math.round(a*255).toString(16).padStart(2,'0');

/* ══════════════ SVG BUILDING BLOCKS ══════════════ */
const C30=Math.cos(Math.PI/6), S30=Math.sin(Math.PI/6);
const iso=(wx,wy,wz,ox,oy)=>({x:ox+wx*C30-wz*C30, y:oy-wy-wx*S30-wz*S30});
const pts2s=ps=>ps.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
const mkArr=(id,c)=>(
  <marker key={id} id={id} markerWidth="5" markerHeight="5" refX="3" refY="2.5" orient="auto">
    <path d="M0,0 L0,5 L5,2.5 z" fill={c}/>
  </marker>
);

/* ── Axes2D ── */
const Axes2D = ({angle=0,vx=60,vy=40,showV=true,showComp=false,color="#10b981",sz=160}) => {
  const cx=sz/2,cy=sz/2,L=62;
  const r=angle*Math.PI/180,co=Math.cos(r),si=Math.sin(r);
  const ax1={x:cx+L*co,y:cy-L*si},ay1={x:cx-L*si,y:cy-L*co};
  const ax2={x:cx-L*co,y:cy+L*si},ay2={x:cx+L*si,y:cy+L*co};
  const tvx=cx+vx,tvy=cy-vy;
  const cX=vx*co+vy*si,cY=-vx*si+vy*co;
  const f1x=cx+cX*co,f1y=cy-cX*si,f2x=cx-cY*si,f2y=cy-cY*co;
  const uid=color.replace(/\W/g,'');
  return (
    <svg width={sz} height={sz} style={{overflow:"visible"}}>
      <defs>{mkArr(`aax${uid}`,color)}</defs>
      <line x1={ax2.x} y1={ax2.y} x2={ax1.x} y2={ax1.y} stroke="#ffffff33" strokeWidth="1.5"/>
      <line x1={ay2.x} y1={ay2.y} x2={ay1.x} y2={ay1.y} stroke="#ffffff33" strokeWidth="1.5"/>
      <text x={ax1.x+5} y={ax1.y+4} fill="#ffffff55" fontSize="11" fontFamily="JetBrains Mono">x'</text>
      <text x={ay1.x+2} y={ay1.y-4} fill="#ffffff55" fontSize="11" fontFamily="JetBrains Mono">y'</text>
      {showComp && showV && <>
        <line x1={cx} y1={cy} x2={f1x} y2={f1y} stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.8"/>
        <line x1={cx} y1={cy} x2={f2x} y2={f2y} stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.8"/>
        <line x1={tvx} y1={tvy} x2={f1x} y2={f1y} stroke="#f59e0b44" strokeWidth="1" strokeDasharray="3,3"/>
        <line x1={tvx} y1={tvy} x2={f2x} y2={f2y} stroke="#f59e0b44" strokeWidth="1" strokeDasharray="3,3"/>
        <text x={(cx+f1x)/2+4} y={(cy+f1y)/2+12} fill="#fbbf24" fontSize="10" fontFamily="JetBrains Mono">v'ₓ={cX.toFixed(0)}</text>
        <text x={(cx+f2x)/2-38} y={(cy+f2y)/2} fill="#fbbf24" fontSize="10" fontFamily="JetBrains Mono">v'ᵧ={cY.toFixed(0)}</text>
      </>}
      {showV && <line x1={cx} y1={cy} x2={tvx} y2={tvy} stroke={color} strokeWidth="2.5" markerEnd={`url(#aax${uid})`}/>}
      <circle cx={cx} cy={cy} r="3" fill="#ffffff66"/>
    </svg>
  );
};

/* ── CubeISO ── */
const CubeISO = ({layers,layerColors,layerNames,selected,onSelect,explode}) => {
  const CW=22,CD=15,CH=8;
  const nK=layers.length,nR=layers[0].length,nC=layers[0][0].length;
  const TW=nC*CW,TD=nR*CD,OX=148,OY=222;
  const prj=(wx,wy,wz)=>iso(wx,wy,wz,OX,OY);
  const bY=k=>k*(CH+explode);
  const draws=[];
  for(let k=0;k<nK;k++){
    const b=bY(k),t=b+CH,col=layerColors[k],sel=k===selected,a=sel?1:0.62;
    draws.push({z:b-200+k*.1,render:()=>(<polygon key={`f${k}`} points={pts2s([prj(0,b,0),prj(TW,b,0),prj(TW,t,0),prj(0,t,0)])} fill={hx(col,a*.45)} stroke={hx(col,a*.9)} strokeWidth={sel?1.5:.5} style={{cursor:"pointer"}} onClick={()=>onSelect(k)}/>)});
    draws.push({z:b-199+k*.1,render:()=>(<polygon key={`r${k}`} points={pts2s([prj(TW,b,0),prj(TW,b,TD),prj(TW,t,TD),prj(TW,t,0)])} fill={hx(col,a*.35)} stroke={hx(col,a*.9)} strokeWidth={sel?1.5:.5} style={{cursor:"pointer"}} onClick={()=>onSelect(k)}/>)});
    for(let ri=0;ri<nR;ri++) for(let ci=0;ci<nC;ci++){
      const cp=[prj(ci*CW,t,ri*CD),prj((ci+1)*CW,t,ri*CD),prj((ci+1)*CW,t,(ri+1)*CD),prj(ci*CW,t,(ri+1)*CD)];
      const mx=(cp[0].x+cp[1].x+cp[2].x+cp[3].x)/4,my=(cp[0].y+cp[1].y+cp[2].y+cp[3].y)/4;
      draws.push({z:t+ri*.01+ci*.001,render:()=>(
        <g key={`c${k}${ri}${ci}`} style={{cursor:"pointer"}} onClick={()=>onSelect(k)}>
          <polygon points={pts2s(cp)} fill={hx(col,sel?.82:.42)} stroke={hx(col,sel?1:.7)} strokeWidth={sel?1.2:.6}/>
          <text x={mx} y={my+3.5} textAnchor="middle" fill={sel?"#fff":"#ffffffaa"} fontSize="8" fontFamily="JetBrains Mono" fontWeight="700">{layers[k][ri][ci]}</text>
        </g>
      )});
    }
    const lp=prj(TW+4,t-CH/2,TD/2);
    draws.push({z:t+10,render:()=>(<text key={`lb${k}`} x={lp.x+4} y={lp.y+3} fill={hx(col,sel?1:.65)} fontSize="9" fontFamily="JetBrains Mono" fontWeight={sel?"700":"400"}>{layerNames[k]}</text>)});
  }
  const axes=()=>{
    const o=prj(0,0,0),ax=prj(TW+12,0,0),az=prj(0,0,TD+10),ay=prj(0,nK*(CH+Math.max(explode,8)),0);
    return(<g opacity=".5">
      <defs>{[["axX","#f87171"],["axZ","#60a5fa"],["axY","#a855f7"]].map(([i,c])=>mkArr(i,c))}</defs>
      <line x1={o.x} y1={o.y} x2={ax.x} y2={ax.y} stroke="#f87171" strokeWidth="1.5" markerEnd="url(#axX)"/>
      <line x1={o.x} y1={o.y} x2={az.x} y2={az.y} stroke="#60a5fa" strokeWidth="1.5" markerEnd="url(#axZ)"/>
      <line x1={o.x} y1={o.y} x2={ay.x} y2={ay.y} stroke="#a855f7" strokeWidth="1.5" markerEnd="url(#axY)"/>
      <text x={ax.x+4} y={ax.y+4} fill="#f87171" fontSize="9" fontFamily="JetBrains Mono">магазины</text>
      <text x={az.x-44} y={az.y+4} fill="#60a5fa" fontSize="9" fontFamily="JetBrains Mono">товары</text>
      <text x={ay.x+4} y={ay.y} fill="#a855f7" fontSize="9" fontFamily="JetBrains Mono">валюта</text>
    </g>);
  };
  draws.sort((a,b)=>a.z-b.z);
  return(<svg width={310} height={245} style={{overflow:"visible",display:"block"}}>{axes()}{draws.map(d=>d.render())}</svg>);
};

/* ══════════════ TAB: СЛОВАРЬ ══════════════ */
const TabDict = () => {
  const terms = [
    {
      ru:"Тензор",en:"Tensor",
      color:"#c084fc",
      math:"Математический объект, существующий независимо от системы координат. Описывает физическую или абстрактную величину.",
      code:"np.array(...)  ← одно представление тензора",
      life:"Само изображение, сама скорость ветра — объект существует, неважно как его записать",
      key:true,
    },
    {
      ru:"Ранг (порядок)",en:"Rank / Order",
      color:"#fbbf24",
      math:"Количество индексов, нужных чтобы получить одно число. НЕ путать с размером.",
      code:"len(tensor.shape)  ← количество осей",
      life:"Ранг 0 = точка, Ранг 1 = список, Ранг 2 = таблица, Ранг 3 = куб",
    },
    {
      ru:"Ось (axis)",en:"Axis / Dimension",
      color:"#34d399",
      math:"Одно направление (индекс) внутри тензора. Ранг = количество осей.",
      code:"tensor.shape[i]  ← размер оси i",
      life:"У матрицы 2 оси: строки и столбцы",
    },
    {
      ru:"Форма (shape)",en:"Shape",
      color:"#60a5fa",
      math:"Кортеж из размеров каждой оси. Говорит «сколько элементов вдоль каждой оси».",
      code:"tensor.shape = (3, 640, 640)  ← 3 оси, размеры 3, 640, 640",
      life:"(3,640,640) = 3 слоя по 640×640",
    },
    {
      ru:"Размерность оси",en:"Axis size",
      color:"#f87171",
      math:"Количество элементов вдоль конкретной оси. shape[i].",
      code:"H = image.shape[0]  ← высота",

      life:"Цена яблок в магазине А = одна компонента матрицы цен",

    {

      color:"#a78bfa",
      math:"Система координат, в которой ты измеряешь. Смена базиса меняет компоненты, но не сам тензор.",
      code:"# USD → RUB: компоненты ×100, тензор тот же",
      life:"Валюта = базис для цен. Меняешь валюту — числа другие, товары те же",
    },
    {
      ru:"Представление",en:"Representation",
      color:"#22d3ee",
      math:"Конкретная форма записи тензора в памяти компьютера. Один и тот же тензор может иметь shape (H,W,3) или (3,H,W).",
      code:"np.transpose(image, (2,0,1))  ← меняет представление",

    },
  ];

  const [open, setOpen] = React.useState(null);

  return (
    <div className="anim-up" style={{maxWidth:"520px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"10px"}}>

      <div style={{background:"linear-gradient(135deg,#1e0033,#002233)",border:"2px solid #8b5cf688",
        borderRadius:"14px",padding:"16px",marginBottom:"4px"}}>
        <div style={{fontFamily:"'Crimson Pro',serif",fontSize:"17px",lineHeight:"1.9",color:"#e2e8f0",fontStyle:"italic"}}>

        </div>
        <div style={{marginTop:"12px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}}>
          {[
            {l:"Тензор",sub:"объект",c:"#c084fc"},
            {l:"Компоненты",sub:"числа в памяти",c:"#fbbf24"},
            {l:"Базис",sub:"как смотришь",c:"#a78bfa"},
          ].map(x=>(
            <div key={x.l} style={{background:x.c+"11",border:`1px solid ${x.c}33`,borderRadius:"8px",padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:"11px",fontWeight:"700",color:x.c}}>{x.l}</div>
              <div style={{fontSize:"9px",color:"#64748b",marginTop:"2px"}}>{x.sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Rank summary */}
      <div style={{background:"#fbbf2408",border:"1px solid #fbbf2430",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontSize:"12px",fontWeight:"700",color:"#fbbf24",marginBottom:"8px"}}>Ранги — наглядно</div>

            gap:"10px",alignItems:"center",background:"transparent",textAlign:"left"}}

            <div style={{width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:0}}/>

              fontSize:"9px",padding:"2px 6px",borderRadius:"4px",fontWeight:"700"}}>КЛЮЧЕВОЙ</span>}

          {open===i && (
            <div className="anim-r" style={{padding:"0 14px 12px",display:"flex",flexDirection:"column",gap:"6px"}}>

                {[
                  {label:"📐 Математика",text:t.math,c:"#a78bfa"},

                    <div style={{fontSize:"10px",color:"#94a3b8",lineHeight:"1.6",fontFamily:s.label.includes("NumPy")?"JetBrains Mono":"inherit"}}>{s.text}</div>

      <div style={{background:"#ef444408",border:"1px solid #ef444440",borderRadius:"10px",padding:"12px"}}>

      </div>

};

/* ══════════════ TAB: RANK 0 & 1 ══════════════ */
const TabR01 = ({axisAngle, spinning, startSpin}) => {
  const [curr, setCurr] = React.useState("USD");
  const rate = curr==="USD" ? 1 : 100;
  const vx=60,vy=40;
  const rad=axisAngle*Math.PI/180;
  const compX=Math.round(vx*Math.cos(rad)+vy*Math.sin(rad));
  const compY=Math.round(-vx*Math.sin(rad)+vy*Math.cos(rad));
  const len=Math.round(Math.sqrt(vx*vx+vy*vy));

  // Price space visualization
  const appleP=10*rate, coffeeP=20*rate;
  const maxV=Math.max(appleP,coffeeP)*1.35;
  const W=220,H=180,pL=52,pB=32,pR=22,pT=22;
  const plotW=W-pL-pR,plotH=H-pB-pT;
  const sx=v=>pL+(v/maxV)*plotW, sy=v=>H-pB-(v/maxV)*plotH;
  const ox2=sx(0),oy2=sy(0);

  return (

              Смена базиса: <span style={{color:"#4ade80"}}>T′ = T</span> — не меняется.
            </div>
          </div>
        </div>

      {/* ─ RANK 1 ─ */}

        <div style={{background:"#07090f",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>

                <defs>

                {/* axes */}
                <line x1={ox2} y1={oy2} x2={W-pR} y2={oy2} stroke="#f87171" strokeWidth="1.5"/>

            <div style={{flex:1,minWidth:"150px",fontSize:"11px",lineHeight:"1.8",color:"#d1d5db"}}>
              Ось X = цена яблока<br/>
              Ось Y = цена кофе<br/>
              <br/>
              Стрелка идёт до точки<br/>
              <span style={{color:"#fde047",fontWeight:"700"}}>[{appleP}, {coffeeP}]</span><br/>
              <br/>
              <span style={{color:"#64748b",fontSize:"10px"}}>
                Меняй валюту:<br/>
                масштаб осей ×100<br/>
                числа ×100<br/>
                <span style={{color:"#4ade80"}}>направление — то же!</span><br/>
                <span style={{color:"#4ade80"}}>кофе всегда 2× яблока</span>
              </span>
            </div>
          </div>
        </div>

        {/* ─ Interactive rotation ─ */}
        <div style={{display:"flex",gap:"16px",alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}>
          <Axes2D angle={axisAngle} vx={vx} vy={vy} showV={true} showComp={true} color="#34d399" sz={172}/>
          <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
            <div style={{fontSize:"11px",color:"#64748b"}}>Угол осей:</div>

              <div style={{color:"#f87171"}}>v'ₓ = {compX}</div>
              <div style={{color:"#4ade80"}}>v'ᵧ = {compY}</div>
              <div style={{color:"#475569",fontSize:"10px",marginTop:"6px"}}>|v| = {len} ← не меняется</div>

};

/* ══════════════ TAB: RANK 2 ══════════════ */
const TabR2 = () => {
  const [hlRow, setHlRow] = React.useState(null);
  const [curr,  setCurr]  = React.useState("USD");
  const rate = curr==="USD" ? 1 : 100;

  const priceBase = [[10,20,15],[8,25,12]];
  const price = priceBase.map(row=>row.map(v=>v*rate));
  const rowLabels = ["🍎 Яблоки","☕ Кофе"];
  const colLabels = ["МагА","МагБ","МагВ"];
  const rowColors = ["#f59e0b","#ef4444"];

  // Correct angle between 2 row-vectors in (МагА, МагБ) subspace
  const a=[priceBase[0][0],priceBase[0][1]], b=[priceBase[1][0],priceBase[1][1]];
  const dot=a[0]*b[0]+a[1]*b[1];
  const la=Math.sqrt(a[0]*a[0]+a[1]*a[1]),lb=Math.sqrt(b[0]*b[0]+b[1]*b[1]);
  const angleDeg=Math.round(Math.acos(Math.min(1,dot/(la*lb)))*180/Math.PI);

  // 2D vector plot in "store space" (МагА vs МагБ)
  const maxV=Math.max(...price.map(r=>Math.max(r[0],r[1])))*1.4;
  const W=200,H=175,pL=48,pB=30,pR=18,pT=18;
  const plotW=W-pL-pR,plotH=H-pB-pT;
  const sx=v=>pL+(v/maxV)*plotW, sy=v=>H-pB-(v/maxV)*plotH;
  const ox=sx(0),oy=sy(0);

  return (
    <div className="anim-up" style={{maxWidth:"520px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"14px"}}>
      <div style={{background:"#3b82f611",border:"2px solid #3b82f644",borderRadius:"12px",padding:"14px"}}>
        <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"8px"}}>
          <Badge n="2" color="#3b82f6"/>
          <span style={{color:"#60a5fa",fontWeight:"700",fontSize:"13px"}}>Матрица — таблица = стопка векторов</span>
        </div>
        <p style={{fontSize:"12px",color:"#d1d5db",lineHeight:"1.7"}}>
          Два индекса: <Kd c="#60a5fa" ch="M[i, j]"/> — строка <em>i</em> и столбец <em>j</em>.<br/>
          Матрица = каждая <strong style={{color:"#fde047"}}>строка есть вектор</strong> в «пространстве столбцов».
        </p>
      </div>

      {/* ─ Clickable matrix table ─ */}
      <div style={{background:"#07090f",border:"1px solid #1e293b",borderRadius:"10px",padding:"14px"}}>
        <div style={{fontSize:"11px",color:"#64748b",marginBottom:"10px",textAlign:"center"}}>
          Нажми на строку — увидишь её как вектор
        </div>
        <div style={{display:"flex",justifyContent:"center"}}>
          <div>
            {/* Column headers */}
            <div style={{display:"flex",marginLeft:"82px",marginBottom:"6px"}}>
              {colLabels.map((l,ci)=>(
                <div key={ci} style={{width:"58px",textAlign:"center",fontSize:"10px",color:"#60a5fa",fontWeight:"700"}}>[j={ci}]<br/>{l}</div>
              ))}
            </div>
            {/* Rows */}
            {priceBase.map((row,ri)=>(
              <div key={ri} style={{display:"flex",gap:"6px",marginBottom:"5px",alignItems:"center"}}>
                {/* Row label button */}
                <button className="btn" onClick={()=>setHlRow(hlRow===ri?null:ri)}
                  style={{width:"76px",height:"40px",borderRadius:"7px",fontSize:"10px",fontWeight:"700",
                    background:hlRow===ri?rowColors[ri]:rowColors[ri]+"18",
                    color:hlRow===ri?"#07090f":rowColors[ri],
                    border:`2px solid ${rowColors[ri]}${hlRow===ri?"ff":"55"}`,
                    transition:"all 0.2s",paddingLeft:"4px",textAlign:"left"}}>
                  [i={ri}]<br/>{rowLabels[ri]}
                </button>
                {/* Cells */}
                {row.map((val,ci)=>{
                  const isHL=hlRow===ri;
                  return (
                    <div key={ci}
                      style={{width:"58px",height:"40px",borderRadius:"7px",
                        background:isHL?rowColors[ri]+"44":"#1f2937",
                        border:`${isHL?2:1}px solid ${isHL?rowColors[ri]:"#374151"}`,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:"14px",fontWeight:"700",color:"white",transition:"all 0.2s"}}>
                      {curr==="USD"?`$${val}`:`₽${val*rate}`}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
        {/* Row as vector display */}
        {hlRow !== null && (
          <div className="anim-r" style={{marginTop:"10px",background:"#07090f",borderRadius:"8px",
            padding:"10px",border:`1px solid ${rowColors[hlRow]}66`,textAlign:"center"}}>
            <div style={{fontSize:"12px",marginBottom:"4px"}}>
              <Kd c={rowColors[hlRow]} ch={`price[${hlRow}]`}/>
              <span style={{color:"#475569"}}> = вектор </span>
              <Kd c="#fde047" ch={`[${price[hlRow].join(', ')}]`}/>
            </div>
            <div style={{fontSize:"10px",color:"#475569"}}>
              → {rowLabels[hlRow]}: цена в {colLabels.join(', ')} — это ранг-1 тензор
            </div>
          </div>
        )}
        {/* Currency toggle */}
        <div style={{display:"flex",gap:"6px",justifyContent:"center",marginTop:"10px"}}>
          {["USD","RUB"].map(c=>(
            <button key={c} className="btn" onClick={()=>setCurr(c)}
              style={{padding:"4px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:"700",
                background:curr===c?"#3b82f6":"#3b82f622",color:curr===c?"white":"#60a5fa",
                border:"1px solid #3b82f6",transition:"all 0.2s"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* ─ Vectors in store-space ─ */}
      <div style={{background:"#07090f",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontSize:"11px",color:"#60a5fa",fontWeight:"700",marginBottom:"6px"}}>
          Строки матрицы как векторы в «пространстве магазинов»
        </div>
        <p style={{fontSize:"10px",color:"#64748b",lineHeight:"1.6",marginBottom:"10px"}}>
          Ось X = цена в МагА, Ось Y = цена в МагБ.<br/>
          Каждая строка матрицы — стрелка в этом пространстве.
        </p>
        <div style={{display:"flex",gap:"12px",alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center"}}>
          <svg width={W} height={H} style={{overflow:"visible",display:"block"}}>
            <defs>{mkArr("mv1",rowColors[0])}{mkArr("mv2",rowColors[1])}</defs>
            {[.25,.5,.75,1].map((t,i)=>(
              <g key={i} opacity=".1">
                <line x1={sx(t*maxV)} y1={pT} x2={sx(t*maxV)} y2={oy} stroke="white" strokeWidth=".7" strokeDasharray="3,3"/>
                <line x1={ox} y1={sy(t*maxV)} x2={W-pR} y2={sy(t*maxV)} stroke="white" strokeWidth=".7" strokeDasharray="3,3"/>
              </g>
            ))}
            <line x1={ox} y1={oy} x2={W-pR} y2={oy} stroke="#60a5fa88" strokeWidth="1.5"/>
            <line x1={ox} y1={oy} x2={ox} y2={pT} stroke="#4ade8088" strokeWidth="1.5"/>
            <polygon points={`${W-pR},${oy-3} ${W-pR},${oy+3} ${W-pR+5},${oy}`} fill="#60a5fa"/>
            <polygon points={`${ox-3},${pT+4} ${ox+3},${pT+4} ${ox},${pT-2}`} fill="#4ade80"/>
            <text x={W-pR+4} y={oy+12} fill="#60a5fa" fontSize="9" fontFamily="JetBrains Mono">МагА</text>
            <text x={ox-5} y={pT-2} textAnchor="end" fill="#4ade80" fontSize="9" fontFamily="JetBrains Mono">МагБ</text>
            {[.25,.5,.75].map((t,i)=>(
              <g key={i}>
                <text x={sx(t*maxV)} y={oy+11} textAnchor="middle" fill="#ffffff22" fontSize="7" fontFamily="JetBrains Mono">{Math.round(t*maxV*rate)}</text>
                <text x={ox-4} y={sy(t*maxV)+3} textAnchor="end" fill="#ffffff22" fontSize="7" fontFamily="JetBrains Mono">{Math.round(t*maxV*rate)}</text>
              </g>
            ))}
            {/* Angle arc - drawn correctly between the two vectors */}
            {(()=>{
              const vA={x:price[0][0],y:price[0][1]};
              const vB={x:price[1][0],y:price[1][1]};
              const aA=Math.atan2(vA.y,vA.x), aB=Math.atan2(vB.y,vB.x);
              const R=30;
              const ax1=ox+R*Math.cos(aA), ay1=oy-R*Math.sin(aA);
              const ax2=ox+R*Math.cos(aB), ay2=oy-R*Math.sin(aB);
              return (
                <g>
                  <path d={`M ${ax1.toFixed(1)} ${ay1.toFixed(1)} A ${R} ${R} 0 0 ${aA>aB?0:1} ${ax2.toFixed(1)} ${ay2.toFixed(1)}`}
                    fill="none" stroke="#fde04766" strokeWidth="1.5"/>
                  <text x={ox+R*1.5*Math.cos((aA+aB)/2)} y={oy-R*1.5*Math.sin((aA+aB)/2)+3}
                    fill="#fde04799" fontSize="9" fontFamily="JetBrains Mono" textAnchor="middle">α</text>
                </g>
              );
            })()}
            {/* Vectors */}
            {price.map((row,ri)=>(
              <g key={ri}>
                <line x1={ox} y1={oy} x2={sx(row[0])-1} y2={sy(row[1])+1}
                  stroke={rowColors[ri]} strokeWidth="2.8" markerEnd={`url(#mv${ri+1})`}/>
                <circle cx={sx(row[0])} cy={sy(row[1])} r="5" fill={rowColors[ri]}/>
                <rect x={sx(row[0])+7} y={sy(row[1])-14} width="92" height="16" rx="3" fill="#07090fcc"/>
                <text x={sx(row[0])+9} y={sy(row[1])-2} fill={rowColors[ri]} fontSize="9.5" fontFamily="JetBrains Mono" fontWeight="700">
                  {rowLabels[ri]}: [{row[0]},{row[1]}]
                </text>
              </g>
            ))}
          </svg>
          <div style={{display:"flex",flexDirection:"column",gap:"8px",minWidth:"120px"}}>
            <div style={{background:"#1f2937",borderRadius:"8px",padding:"10px",border:"1px solid #374151",fontSize:"11px"}}>
              <div style={{color:"#64748b",marginBottom:"4px",fontSize:"10px"}}>Угол α между векторами:</div>
              <div style={{color:"#fde047",fontWeight:"700",fontSize:"14px"}}>{angleDeg}°</div>
              <div style={{color:"#4ade80",fontSize:"9px",marginTop:"4px"}}>при {curr} тоже {angleDeg}°</div>
              <div style={{color:"#475569",fontSize:"9px",marginTop:"4px",lineHeight:"1.5"}}>
                Смена валюты = смена масштаба обеих осей. Угол сохраняется.
              </div>
            </div>
            <div style={{fontSize:"10px",color:"#475569",lineHeight:"1.6",background:"#07090f",
              borderRadius:"6px",padding:"8px",border:"1px solid #1e293b"}}>
              <strong style={{color:"#60a5fa"}}>Матрица</strong> = конфигурация векторов.<br/>
              Сами векторы = тензоры ранга 1.<br/>
              Их таблица = тензор ранга 2.
            </div>
          </div>
        </div>
      </div>

      <div style={{background:"#07090f",border:"1px solid #1e293b",borderRadius:"8px",padding:"10px",textAlign:"center",fontSize:"12px"}}>
        <Kd c="#60a5fa" ch="price.shape = (2, 3)"/>
        <span style={{color:"#475569"}}> — 2 оси, нужно 2 индекса: </span>
        <Kd c="#fde047" ch="price[i, j]"/>
      </div>
    </div>
  );
};

const TabR4 = () => {
  // Progressive ranks - built as a scrollable strip
  const rCol=["#f59e0b","#10b981","#3b82f6","#a855f7","#06b6d4"];
  const items=[
    {r:0,n:"Ранг 0",s:"()",     desc:"Точка"},
    {r:1,n:"Ранг 1",s:"(N,)",   desc:"Строка"},
    {r:2,n:"Ранг 2",s:"(N,M)",  desc:"Таблица"},
    {r:3,n:"Ранг 3",s:"(N,M,K)",desc:"Куб"},
    {r:4,n:"Ранг 4",s:"(B,N,M,K)",desc:"Батч"},
  ];

  const [bSel, setBSel] = React.useState(0);
  const B=4;

  // Mini isometric batch illustration
  const BatchMini = ({selected,onSelect}) => {
    const CW=18,CD=12,CH=5,C2=3,H2=4,W2=5;
    const bGap=82;
    const draws=[];
    const cColors=["#ef4444","#22c55e","#3b82f6"];
    for(let b=0;b<B;b++){
      const ox2=22+b*bGap, oy2=120;
      const isSel=b===selected;
      const prj2=(wx,wy,wz)=>iso(wx,wy,wz,ox2,oy2);
      for(let c=0;c<C2;c++){
        const bY2=c*(CH+2),tY2=bY2+CH,col=cColors[c],TW2=W2*CW,TD2=H2*CD;
        const a=isSel?1:0.5;
        draws.push({b,z:bY2-100+b*.01,render:()=>(
          <polygon key={`f${b}${c}`} points={pts2s([prj2(0,bY2,0),prj2(TW2,bY2,0),prj2(TW2,tY2,0),prj2(0,tY2,0)])}
            fill={hx(col,a*.35)} stroke={hx(col,a*.9)} strokeWidth={isSel?1:.4} style={{cursor:"pointer"}} onClick={()=>onSelect(b)}/>
        )});
        draws.push({b,z:bY2-99+b*.01,render:()=>(
          <polygon key={`r${b}${c}`} points={pts2s([prj2(TW2,bY2,0),prj2(TW2,bY2,TD2),prj2(TW2,tY2,TD2),prj2(TW2,tY2,0)])}
            fill={hx(col,a*.22)} stroke={hx(col,a*.9)} strokeWidth={isSel?1:.4} style={{cursor:"pointer"}} onClick={()=>onSelect(b)}/>
        )});
        for(let h=0;h<H2;h++) for(let w=0;w<W2;w++){
          const cp=[prj2(w*CW,tY2,h*CD),prj2((w+1)*CW,tY2,h*CD),prj2((w+1)*CW,tY2,(h+1)*CD),prj2(w*CW,tY2,(h+1)*CD)];
          draws.push({b,z:tY2+h*.01+w*.001,render:()=>(
            <polygon key={`p${b}${c}${h}${w}`} points={pts2s(cp)}
              fill={hx(col,a*.55)} stroke={hx(col,a*.6)} strokeWidth=".3" style={{cursor:"pointer"}} onClick={()=>onSelect(b)}/>
          )});
        }
      }
      const lp=prj2(W2*CW/2,0,H2*CD/2);
      draws.push({b,z:200,render:()=>(
        <text key={`lbl${b}`} x={lp.x} y={lp.y+16} textAnchor="middle"
          fill={isSel?"#06b6d4":"#475569"} fontSize="10" fontFamily="JetBrains Mono" fontWeight={isSel?"700":"400"}
          style={{cursor:"pointer"}} onClick={()=>onSelect(b)}>[{b}]</text>
      )});
    }
    draws.sort((a,b2)=>a.z-b2.z);
    return (
      <svg width={360} height={145} style={{overflow:"visible",display:"block",maxWidth:"100%"}}>
        {draws.map(d=>d.render())}
        <text x="180" y="138" textAnchor="middle" fill="#06b6d455" fontSize="9" fontFamily="JetBrains Mono">← batch (B={B} изображения) →</text>
      </svg>
    );
  };

  return (
    <div className="anim-up" style={{maxWidth:"545px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"14px"}}>
      <div style={{background:"#06b6d411",border:"2px solid #06b6d444",borderRadius:"12px",padding:"14px"}}>
        <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"8px"}}>
          <Badge n="4" color="#06b6d4"/>
          <span style={{color:"#22d3ee",fontWeight:"700",fontSize:"13px"}}>Батч — стопка кубов</span>
        </div>
        <p style={{fontSize:"12px",color:"#d1d5db",lineHeight:"1.7"}}>
          Четыре индекса: <Kd c="#22d3ee" ch="T[b, c, h, w]"/>.<br/>
          В Deep Learning обрабатываем несколько изображений сразу — <strong style={{color:"#fde047"}}>батч</strong>.<br/>
          Батч = стопка кубов → ранг 4.
        </p>
      </div>

      {/* Progressive strip */}
      <div style={{background:"#07090f",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontSize:"11px",color:"#22d3ee",fontWeight:"700",textAlign:"center",marginBottom:"10px"}}>
          Эволюция: ранг 0 → ранг 4
        </div>
        <div style={{overflowX:"auto",paddingBottom:"6px"}}>
          <div style={{display:"flex",gap:"6px",alignItems:"stretch",minWidth:"max-content",padding:"4px"}}>
            {items.map((x,i)=>(
              <React.Fragment key={i}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",
                  background:rCol[x.r]+(x.r===4?"18":"0a"),border:`1px solid ${rCol[x.r]}${x.r===4?"55":"22"}`,
                  borderRadius:"10px",padding:"10px 10px 8px",minWidth:"80px"}}>
                  <Badge n={x.r} color={rCol[x.r]}/>
                  {/* Mini shape illustration */}
                  <div style={{height:"48px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {x.r===0 && <div style={{width:"16px",height:"16px",borderRadius:"50%",background:rCol[0]}}/>}
                    {x.r===1 && (
                      <div style={{display:"flex",gap:"3px"}}>
                        {[0,1,2,3].map(i=>(<div key={i} style={{width:"12px",height:"12px",borderRadius:"3px",background:rCol[1]+"55",border:`1px solid ${rCol[1]}`}}/>))}
                      </div>
                    )}
                    {x.r===2 && (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"2px"}}>
                        {Array.from({length:9}).map((_,i)=>(<div key={i} style={{width:"12px",height:"12px",borderRadius:"2px",background:rCol[2]+"55",border:`1px solid ${rCol[2]}`,opacity:.5+i*.06}}/>))}
                      </div>
                    )}
                    {x.r===3 && (
                      <svg width="52" height="44" style={{overflow:"visible"}}>
                        {[2,1,0].map(k=>{
                          const ox2=10+k*3,oy2=36-k*6;
                          return [0,1].map(ri=>[0,1,2].map(ci=>{
                            const p=(wx,wy,wz)=>iso(wx,wy,wz,ox2,oy2);
                            const sx2=ci*10,ex=(ci+1)*10,sz=ri*8,ez=(ri+1)*8;
                            return(<polygon key={`${k}${ri}${ci}`}
                              points={pts2s([p(sx2,8,sz),p(ex,8,sz),p(ex,8,ez),p(sx2,8,ez)])}
                              fill={hx(rCol[3],.45)} stroke={hx(rCol[3],.8)} strokeWidth=".6"/>);
                          }));
                        })}
                      </svg>
                    )}
                    {x.r===4 && (
                      <div style={{display:"flex",gap:"3px"}}>
                        {[0,1,2].map(b=>(
                          <svg key={b} width="18" height="32" style={{overflow:"visible"}}>
                            {[2,1,0].map(k=>{
                              const ox2=4+k*2,oy2=28-k*4;
                              return(<polygon key={k}
                                points={pts2s([iso(0,6,0,ox2,oy2),iso(12,6,0,ox2,oy2),iso(12,6,8,ox2,oy2),iso(0,6,8,ox2,oy2)])}
                                fill={hx(rCol[4],.35)} stroke={hx(rCol[4],.8)} strokeWidth=".5"/>);
                            })}
                          </svg>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{fontSize:"10px",fontWeight:"700",color:rCol[x.r]}}>{x.n}</div>
                  <div style={{fontSize:"8px",color:rCol[x.r]+"88"}}>{x.s}</div>
                  <div style={{fontSize:"8.5px",color:"#475569"}}>{x.desc}</div>
                </div>
                {i<items.length-1 && (
                  <div style={{display:"flex",alignItems:"center",color:"#374151",fontSize:"18px",paddingBottom:"10px"}}>→</div>
                )}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>

      {/* Batch visual */}
      <div style={{background:"#07090f",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontSize:"11px",color:"#22d3ee",fontWeight:"700",marginBottom:"4px"}}>
          images.shape = (4, 3, 64, 64)
        </div>
        <div style={{fontSize:"10px",color:"#475569",marginBottom:"12px"}}>
          Кликни на изображение в батче
        </div>
        <div style={{display:"flex",justifyContent:"center",overflowX:"auto"}}>
          <BatchMini selected={bSel} onSelect={setBSel}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginTop:"10px"}}>
          {[
            {idx:"B",desc:"batch — сколько изображений",ex:"4",c:"#06b6d4"},
            {idx:"C",desc:"channels — RGB каналы",       ex:"3",c:"#ef4444"},
            {idx:"H",desc:"height — высота пикселей",    ex:"64",c:"#4ade80"},
            {idx:"W",desc:"width  — ширина пикселей",    ex:"64",c:"#60a5fa"},
          ].map(x=>(
            <div key={x.idx} style={{background:x.c+"0a",border:`1px solid ${x.c}28`,borderRadius:"8px",padding:"8px"}}>
              <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"2px"}}>
                <span style={{fontSize:"15px",fontWeight:"700",color:x.c}}>{x.idx}</span>

          {/* Pixel grid */}
          <div style={{display:"flex",flexDirection:"column",gap:"6px",alignItems:"center"}}>
            <div style={{fontSize:"9px",color:"#475569",marginBottom:"2px"}}>Изображение</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px"}}>
              {pixels.map((p,i)=>(
                <div key={i} style={{width:"64px",height:"64px",borderRadius:"8px",
                  background:p.color,display:"flex",flexDirection:"column",
                  alignItems:"center",justifyContent:"center",border:"2px solid white22"}}>
                  <span style={{fontSize:"9px",color:"white",fontWeight:"700",textShadow:"0 1px 3px #000"}}>{p.name}</span>
                  <span style={{fontSize:"8px",color:"white",textShadow:"0 1px 3px #000",opacity:.8}}>{p.label}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize:"9px",color:"#475569",textAlign:"center"}}>2 строки × 2 столбца</div>
          </div>
          {/* RGB breakdown */}
          <div style={{flex:1,minWidth:"160px"}}>
            <div style={{fontSize:"9px",color:"#475569",marginBottom:"6px"}}>Каждый пиксель = [R, G, B]</div>
            {pixels.map((p,i)=>(
              <div key={i} style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"5px"}}>
                <div style={{width:"16px",height:"16px",borderRadius:"3px",background:p.color,flexShrink:0,border:"1px solid #ffffff33"}}/>
                <span style={{fontSize:"10px",color:"#94a3b8",width:"32px"}}>{p.name}</span>
                <div style={{display:"flex",gap:"3px"}}>
                  {p.rgb.map((v,j)=>(
                    <div key={j} style={{width:"34px",height:"22px",borderRadius:"4px",
                      background:[`#ef444433`,`#22c55e33`,`#3b82f633`][j],
                      border:`1px solid ${["#ef4444","#22c55e","#3b82f6"][j]}55`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:"10px",fontWeight:"700",color:["#fca5a5","#86efac","#93c5fd"][j]}}>
                      {v}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginTop:"10px",textAlign:"center",fontSize:"11px",color:"#64748b"}}>
          Итого: 4 пикселя × 3 канала = <strong style={{color:"#fde047"}}>12 чисел</strong>
        </div>
      </div>

      {/* ─ Two representations side by side ─ */}
      <div style={{fontSize:"11px",color:"#94a3b8",textAlign:"center",marginBottom:"-6px"}}>
        Выбери способ организации этих 12 чисел в памяти:
      </div>
      <div style={{display:"flex",gap:"6px",justifyContent:"center"}}>
        {[{id:"hwc",l:"(H, W, C)  — NumPy/TF/PIL",c:"#fde047"},{id:"chw",l:"(C, H, W)  — PyTorch",c:"#22d3ee"}].map(x=>(
          <button key={x.id} className="btn" onClick={()=>setView(x.id)}
            style={{flex:1,padding:"8px",borderRadius:"8px",fontSize:"11px",fontWeight:"700",
              background:view===x.id?x.c+"22":"transparent",color:x.c,
              border:`2px solid ${x.c}${view===x.id?"99":"33"}`,transition:"all 0.2s"}}>
            {x.l}
          </button>
        ))}
      </div>

      {view==="hwc" && (
        <div className="anim-r" style={{background:"#fde04708",border:"1px solid #fde04733",borderRadius:"10px",padding:"12px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:"#fde047",marginBottom:"8px"}}>
            shape = (2, 2, 3) — организация [строка][столбец][канал]
          </div>
          <div style={{fontFamily:"JetBrains Mono",fontSize:"10px",color:"#d1d5db",lineHeight:"2.0",
            background:"#07090f",borderRadius:"8px",padding:"10px",border:"1px solid #1e293b",marginBottom:"10px"}}>
            {`image[0][0] = [`}<span style={{color:"#fca5a5"}}>255</span>, <span style={{color:"#86efac"}}>0</span>, <span style={{color:"#93c5fd"}}>0</span>]  {` ← красный (0,0)`}<br/>
            {`image[0][1] = [`}<span style={{color:"#fca5a5"}}>0</span>, <span style={{color:"#86efac"}}>255</span>, <span style={{color:"#93c5fd"}}>0</span>]   {` ← зелёный (0,1)`}<br/>
            {`image[1][0] = [`}<span style={{color:"#fca5a5"}}>0</span>, <span style={{color:"#86efac"}}>0</span>, <span style={{color:"#93c5fd"}}>255</span>]  {` ← синий (1,0)`}<br/>
            {`image[1][1] = [`}<span style={{color:"#fca5a5"}}>255</span>, <span style={{color:"#86efac"}}>255</span>, <span style={{color:"#93c5fd"}}>0</span>]  {` ← жёлтый (1,1)`}
          </div>
          {/* Visual grid */}
          <div style={{display:"flex",gap:"8px",alignItems:"flex-start",flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:"9px",color:"#475569",marginBottom:"4px",textAlign:"center"}}>Матрица строк</div>
              {hwc.map((row,ri)=>(
                <div key={ri} style={{display:"flex",gap:"3px",marginBottom:"3px"}}>
                  <div style={{width:"22px",fontSize:"9px",color:"#4ade80",display:"flex",alignItems:"center"}}>[{ri}]</div>
                  {row.map((px,ci)=>(
                    <div key={ci} style={{background:`rgb(${px[0]},${px[1]},${px[2]})`,
                      width:"42px",height:"32px",borderRadius:"5px",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      border:"1px solid #ffffff22",fontSize:"7.5px",color:"white",textShadow:"0 1px 3px #000",fontWeight:"700"}}>
                      [{px.join(',')}]
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{flex:1,minWidth:"150px",fontSize:"10px",color:"#94a3b8",lineHeight:"1.7"}}>
              <strong style={{color:"#4ade80"}}>plt.imshow(image)</strong> — работает!<br/>
              matplotlib видит (H=2, W=2, C=3) → понимает как изображение<br/>
              <br/>
              <span style={{color:"#64748b",fontSize:"9px"}}>
                image[i, j] → один пиксель [R,G,B]<br/>
                image[i, j, 0] → R-компонента пикселя
              </span>
            </div>
          </div>
        </div>
      )}

      {view==="chw" && (
        <div className="anim-r" style={{background:"#22d3ee08",border:"1px solid #22d3ee33",borderRadius:"10px",padding:"12px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:"#22d3ee",marginBottom:"8px"}}>
            shape = (3, 2, 2) — организация [канал][строка][столбец]
          </div>
          <div style={{fontFamily:"JetBrains Mono",fontSize:"10px",color:"#d1d5db",lineHeight:"2.0",
            background:"#07090f",borderRadius:"8px",padding:"10px",border:"1px solid #1e293b",marginBottom:"10px"}}>
            {`image[0] = R-канал:`}<br/>
            &nbsp;&nbsp;[<span style={{color:"#fca5a5"}}>255</span>, <span style={{color:"#fca5a5"}}>0</span>]  &nbsp;← R пикселей строки 0<br/>
            &nbsp;&nbsp;[<span style={{color:"#fca5a5"}}>0</span>, <span style={{color:"#fca5a5"}}>255</span>]  &nbsp;← R пикселей строки 1<br/>
            {`image[1] = G-канал, image[2] = B-канал...`}
          </div>
          {/* Channel display */}
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap",justifyContent:"center",marginBottom:"10px"}}>
            {chw.map((channel,ci)=>(
              <div key={ci} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
                <div style={{fontSize:"9px",fontWeight:"700",color:channelColors[ci]}}>image[{ci}] = {channelLabels[ci]}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px",
                  border:`2px solid ${channelColors[ci]}55`,padding:"3px",borderRadius:"6px",
                  background:channelColors[ci]+"0a"}}>
                  {channel.flat().map((v,i)=>(
                    <div key={i} style={{width:"30px",height:"24px",borderRadius:"4px",
                      background:channelColors[ci],opacity:v>0?.85:.2,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:"9px",color:"white",fontWeight:"700",textShadow:"0 1px 2px #000"}}>{v}</div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div style={{fontSize:"10px",color:"#94a3b8",lineHeight:"1.7"}}>
            <strong style={{color:"#ef4444"}}>plt.imshow(image)</strong> — <span style={{color:"#ef4444"}}>НЕ работает как ожидаешь!</span><br/>
            matplotlib видит (3, 2, 2) = 3 строки по 2 элемента → не понимает как одно изображение<br/>
            <br/>
            <strong style={{color:"#4ade80"}}>plt.imshow(image.transpose(1,2,0))</strong> — работает!<br/>
            <span style={{color:"#64748b",fontSize:"9px"}}>transpose переставляет оси: (3,2,2) → (2,2,3)</span>
          </div>
        </div>
      )}

      {/* ─ THE KEY INSIGHT ─ */}
      <div style={{background:"linear-gradient(135deg,#00231a,#00153b)",border:"2px solid #4ade8055",
        borderRadius:"12px",padding:"14px"}}>
        <div style={{fontSize:"13px",fontWeight:"700",color:"#4ade80",marginBottom:"10px"}}>
          💡 Главный вывод
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"8px",fontSize:"12px"}}>
          {[
            {icon:"✅",t:"Тензор = сами данные (12 чисел, описывающих 4 пикселя)",c:"#4ade80"},
            {icon:"✅",t:"Форма (shape) = способ организации в памяти [(2,2,3) или (3,2,2)]",c:"#4ade80"},
            {icon:"✅",t:"Транспозиция меняет форму, НЕ меняет тензор",c:"#22d3ee"},
            {icon:"✅",t:"plt.imshow требует (H,W,C) — это соглашение библиотеки, не свойство тензора",c:"#fbbf24"},
            {icon:"⚠️",t:"«Форма изменилась» ≠ «другой тензор»",c:"#f87171"},
          ].map((x,i)=>(
            <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start"}}>
              <span style={{fontSize:"14px",flexShrink:0}}>{x.icon}</span>
              <span style={{color:"#d1d5db",lineHeight:"1.5"}}>{x.t}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:"12px",background:"#07090f",borderRadius:"8px",padding:"10px",
          border:"1px solid #1e293b",fontSize:"11px",fontFamily:"JetBrains Mono",color:"#94a3b8",lineHeight:"1.9"}}>
          <span style={{color:"#64748b"}}># Один тензор — два способа хранить:</span><br/>
          <Kd c="#fde047" ch="hwc = np.array(image)          # shape (2,2,3)"/><br/>
          <Kd c="#22d3ee" ch="chw = np.transpose(hwc,(2,0,1)) # shape (3,2,2)"/><br/>
          <Kd c="#4ade80" ch="np.allclose(np.transpose(chw,(1,2,0)), hwc)  # True!"/>
        </div>
      </div>

      {/* ─ Array vs Tensor ─ */}
      <div style={{background:"#07090f",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px"}}>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#94a3b8",marginBottom:"10px"}}>Массив vs Тензор — точное разграничение</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
          {[
            {title:"Тензор",items:["Математический объект","Существует независимо","Описывает реальность","Инвариантен к базису"],c:"#a855f7"},
            {title:"NumPy массив",items:["Представление в памяти","Конкретная форма (shape)","Конкретный порядок осей","Зависит от соглашения"],c:"#06b6d4"},
          ].map(x=>(
            <div key={x.title} style={{background:x.c+"0a",border:`1px solid ${x.c}33`,borderRadius:"8px",padding:"10px"}}>
              <div style={{fontSize:"11px",fontWeight:"700",color:x.c,marginBottom:"6px"}}>{x.title}</div>
              {x.items.map((it,i)=>(
                <div key={i} style={{display:"flex",gap:"5px",fontSize:"10px",color:"#94a3b8",marginBottom:"4px",lineHeight:"1.4"}}>
                  <span style={{color:x.c}}>•</span>{it}
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ══════════════ MAIN APP ══════════════ */
function App() {
  const [tab,       setTab]       = React.useState("dict");
  const [axisAngle, setAxisAngle] = React.useState(0);
  const [spinning,  setSpinning]  = React.useState(false);
  const spinRef = React.useRef(null);

  const startSpin = () => {
    if(spinning){ clearInterval(spinRef.current); setSpinning(false); return; }
    setSpinning(true);
    spinRef.current = setInterval(()=>setAxisAngle(a=>(a+2)%360),40);
  };
  React.useEffect(()=>()=>clearInterval(spinRef.current),[]);

  return (
    <div style={{minHeight:"100vh",background:"#07090f",color:"#e2e8f0",
      fontFamily:"'JetBrains Mono',monospace",padding:"16px"}}>

      {/* Header */}
      <div style={{textAlign:"center",marginBottom:"16px"}}>
        <h1 style={{fontSize:"18px",fontWeight:"700",
          background:"linear-gradient(90deg,#f59e0b,#10b981,#3b82f6,#a855f7,#06b6d4,#10b981)",
          WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:"3px"}}>
          Тензоры — полное объяснение
        </h1>
        <p style={{color:"#334155",fontSize:"10px"}}>
          Математика → NumPy → Реальная жизнь
        </p>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:"4px",marginBottom:"16px",flexWrap:"wrap",justifyContent:"center"}}>
        {TABS.map(t=>{
          const tc=TC[t.id],active=tab===t.id;
          return (
            <button key={t.id} className="btn" onClick={()=>setTab(t.id)}
              style={{padding:"6px 10px",borderRadius:"8px",fontSize:"10.5px",fontWeight:"600",
                background:active?tc.base:tc.dim,color:active?"#07090f":tc.base,
                border:`1px solid ${tc.base}`,transition:"all 0.2s"}}>
              {t.label}
            </button>
          );
        })}
      </div>

      {/* Content */}
      {tab==="dict" && <TabDict/>}
      {tab==="r01"  && <TabR01 axisAngle={axisAngle} spinning={spinning} startSpin={startSpin}/>}
      {tab==="r2"   && <TabR2/>}
      {tab==="r3"   && <TabR3/>}
      {tab==="r4"   && <TabR4/>}
      {tab==="repr" && <TabRepr/>}

      {/* Summary strip */}
      <div style={{maxWidth:"520px",margin:"20px auto 0",background:"#0d1117",border:"1px solid #1e293b",
        borderRadius:"10px",padding:"9px 12px",display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap",justifyContent:"center"}}>
        {[
          {r:0,n:"Скаляр", s:"()",         c:"#f59e0b",id:"r01"},
          {r:1,n:"Вектор", s:"(N,)",       c:"#10b981",id:"r01"},
          {r:2,n:"Матрица",s:"(N,M)",      c:"#3b82f6",id:"r2"},
          {r:3,n:"Куб",    s:"(N,M,K)",    c:"#a855f7",id:"r3"},
          {r:4,n:"Батч",   s:"(B,N,M,K)",  c:"#06b6d4",id:"r4"},
        ].map(x=>(
          <div key={x.r} style={{display:"flex",gap:"5px",alignItems:"center",cursor:"pointer",
            opacity:tab===x.id||tab==="dict"?1:0.28,transition:"opacity 0.3s"}}
            onClick={()=>setTab(x.id)}>
            <Badge n={x.r} color={x.c}/>
            <div style={{fontSize:"9px"}}>
              <div style={{color:x.c,fontWeight:"700"}}>{x.n}</div>
              <div style={{color:"#334155"}}>{x.s}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
